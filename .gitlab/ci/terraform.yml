.terraform-job:
  stage: test
  image:
    name: hashicorp/terraform:1.12
    entrypoint: [""]
  interruptible: true
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success

terraform-validate-static-site:
  extends: .terraform-job
  stage: test
  script:
    - terraform -chdir=infra/aws-static-site init -backend=false
    - terraform -chdir=infra/aws-static-site validate

terraform-validate-personal-todo:
  extends: .terraform-job
  stage: test
  script:
    - terraform -chdir=infra/aws-personal-todo init -backend=false
    - terraform -chdir=infra/aws-personal-todo validate
