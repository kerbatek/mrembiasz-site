frontend-vulnerability-scan:
  stage: security
  image: node:24-bookworm
  interruptible: true
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success
  before_script:
    - npm ci
  script:
    - npm audit --audit-level=high

backend-vulnerability-scan:
  stage: security
  image: python:3.14-slim
  interruptible: true
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success
  script:
    - python -m pip install pip-audit
    - pip-audit --cache-dir .cache/pip-audit -r backend/requirements.txt -r backend/requirements-dev.txt

secret-scan:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.28.0
    entrypoint: [""]
  interruptible: true
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success
  script:
    - gitleaks detect --source "$CI_PROJECT_DIR" --redact --verbose

terraform-security-scan:
  stage: security
  image:
    name: aquasec/trivy:0.67.2
    entrypoint: [""]
  interruptible: true
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success
  variables:
    TRIVY_CACHE_DIR: ".cache/trivy"
  script:
    - trivy config --ignorefile .trivyignore --exit-code 1 --severity HIGH,CRITICAL infra
