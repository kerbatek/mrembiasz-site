frontend-tests:
  stage: test
  image: node:24-bookworm
  interruptible: true
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success
  before_script:
    - npm ci
  script:
    - npm run test:ci
  artifacts:
    when: always
    reports:
      junit: reports/frontend-junit.xml

backend-tests:
  stage: test
  image: python:3.14-slim
  interruptible: true
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success
  before_script:
    - python -m pip install -r backend/requirements-dev.txt
  script:
    - python -m xmlrunner discover tests/backend -o reports/backend
  artifacts:
    when: always
    reports:
      junit: reports/backend/*.xml

integration-tests:
  stage: test
  image: python:3.14-slim
  interruptible: true
  needs:
    - backend-tests
  services:
    - name: amazon/dynamodb-local:2.6.1
      alias: dynamodb-local
      command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
  variables:
    RUN_INTEGRATION_TESTS: "1"
    TODO_TABLE_NAME: "personal-todos"
    TODO_DYNAMODB_ENDPOINT: "http://dynamodb-local:8000"
    AWS_ACCESS_KEY_ID: "local"
    AWS_SECRET_ACCESS_KEY: "local"
    AWS_DEFAULT_REGION: "us-east-1"
  rules:
    - if: "$CI_COMMIT_BRANCH || $CI_COMMIT_TAG"
      when: on_success
  before_script:
    - python -m pip install -r backend/requirements.txt
    - python -m pip install unittest-xml-reporting
  script:
    - python -m xmlrunner discover tests/integration -o reports/integration
  artifacts:
    when: always
    reports:
      junit: reports/integration/*.xml
