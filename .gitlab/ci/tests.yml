frontend-tests:
  stage: test
  image: node:24-bookworm
  interruptible: true
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'
      when: on_success
  before_script:
    - npm ci
  script:
    - npm test

backend-tests:
  stage: test
  image: python:3.14-slim
  interruptible: true
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'
      when: on_success
  script:
    - python -m unittest discover tests/backend
